<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#DD7740"/>
      <stop offset="100%" stop-color="#7A3208"/>
    </linearGradient>
    <!-- Blueprint dot grid -->
    <pattern id="grid" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="0.6" fill="#FAECE7" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Subtle blueprint grid texture -->
  <rect width="100" height="100" rx="22" fill="url(#grid)"/>

  <!-- Letter A — left leg -->
  <line x1="18" y1="83" x2="50" y2="15" stroke="#FAECE7" stroke-width="7.5" stroke-linecap="round"/>
  <!-- Letter A — right leg -->
  <line x1="82" y1="83" x2="50" y2="15" stroke="#FAECE7" stroke-width="7.5" stroke-linecap="round"/>
  <!-- Letter A — crossbar (golden accent) -->
  <line x1="30" y1="57" x2="70" y2="57" stroke="#FAC775" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Agent nodes at vertices -->
  <circle cx="50" cy="15" r="5.5" fill="#FAC775"/>
  <circle cx="18" cy="83" r="4" fill="#FAECE7" opacity="0.7"/>
  <circle cx="82" cy="83" r="4" fill="#FAECE7" opacity="0.7"/>
  <circle cx="30" cy="57" r="3" fill="#FAC775"/>
  <circle cx="70" cy="57" r="3" fill="#FAC775"/>
</svg>
